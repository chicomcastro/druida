<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌿 Druida</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d1410;
        font-family: system-ui, sans-serif;

      #game {
        display: block;

        position: fixed;

        color: #cfe8c8;
        font-size: 14px;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }

  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">🌿 Druida — scaffold (M0)</div>
    <script type="module" src="/src/main.ts"></script>
