<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🌿 Druida</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0d1410;
        font-family: system-ui, sans-serif;
        touch-action: manipulation; /* mata double-tap zoom no touch (E23.2) */
        -webkit-text-size-adjust: 100%;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none; /* toque é gameplay, não scroll/zoom (ADR 0053) */
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        color: #cfe8c8;
        font-size: 14px;
        text-shadow: 0 1px 2px #000;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="hud">🌿 Druida — scaffold (M0)</div>
    <script>
      /* Anti-zoom no touch (E23.2): iOS ignora user-scalable, então bloqueamos
         os gestos de pinça (gesture*) e o double-tap que dava zoom no navegador
         — no tablet o toque é gameplay, zoom preso atrapalha e não desfaz. */
      (function () {
        for (const ev of ['gesturestart', 'gesturechange', 'gestureend']) {
          document.addEventListener(ev, (e) => e.preventDefault(), { passive: false });
        }
        let lastTouch = 0;
        document.addEventListener('touchend', (e) => {
          const now = Date.now();
          if (now - lastTouch <= 320) e.preventDefault(); // 2º toque rápido = zoom
          lastTouch = now;
        }, { passive: false });
        // Pinça com 2 dedos em qualquer lugar: cancela o zoom do navegador.
        document.addEventListener('touchmove', (e) => {
          if (e.touches && e.touches.length > 1) e.preventDefault();
        }, { passive: false });
      })();
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
