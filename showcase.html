<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌿 Druida — Vitrine de Modelos</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: #0c130e; color: #eaf3e6; }
      #app { display: grid; grid-template-columns: 256px 1fr; height: 100vh; }
      aside { background: #0f1a12; border-right: 1px solid rgba(159,224,106,.18); padding: 14px; overflow-y: auto; }
      aside h1 { font-size: 17px; margin: 2px 0 2px; color: #9fe06a; }
      aside .sub { font-size: 11px; opacity: .6; margin: 0 0 14px; }
      .grp { font-size: 10px; letter-spacing: .09em; text-transform: uppercase; opacity: .55; margin: 14px 0 6px; }
      .item { display: block; width: 100%; text-align: left; padding: 8px 10px; margin: 3px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,.08); background: #16241a; color: #eaf3e6; font-size: 13px; cursor: pointer; }
      .item:hover { background: #1f3324; border-color: rgba(159,224,106,.4); }
      .item.active { background: #244a26; border-color: #9fe06a; }
      main { position: relative; }
      canvas { display: block; width: 100%; height: 100%; }
      #bar { position: absolute; top: 0; left: 0; right: 0; padding: 12px 16px; display: flex; gap: 14px; align-items: center; pointer-events: none; text-shadow: 0 1px 3px #000; }
      #bar .name { font-size: 20px; font-weight: 800; }
      #bar .meta { font-size: 12px; opacity: .7; }
      #tools { position: absolute; bottom: 0; left: 0; right: 0; padding: 12px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      .btn { pointer-events: auto; padding: 7px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,.16); background: rgba(16,26,18,.9); color: #eaf3e6; font-size: 12px; cursor: pointer; }
      .btn:hover { border-color: #9fe06a; }
      .btn.on { background: #244a26; border-color: #9fe06a; }
      .hint { pointer-events: none; font-size: 11px; opacity: .55; margin-left: auto; }
    </style>
  </head>
  <body>
    <div id="app">
      <aside>
        <h1>🌿 Vitrine</h1>
        <p class="sub">Backoffice — modelos, formas, inimigos e armas</p>
        <nav id="list"></nav>
      </aside>
      <main>
        <canvas id="view"></canvas>
        <div id="bar"><span class="name" id="m-name">—</span><span class="meta" id="m-meta"></span></div>
        <div id="tools">
          <button class="btn on" id="t-rotate">↻ Girar</button>
          <button class="btn" id="t-reset">⟲ Resetar câmera</button>
          <span class="hint">Arraste para orbitar · scroll para zoom</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/showcase/main.ts"></script>
  </body>
</html>
