version: 2
updates:
  # Dependências npm (agrupadas para reduzir ruído de PRs).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      production:
        dependency-type: production

  # Versões das GitHub Actions usadas nos workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
