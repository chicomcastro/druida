name: Lighthouse

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: lh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Mede o carregamento (tela de menu) servindo o dist; assertions em
      # "warn" para acompanhar a tendência sem bloquear. Ver ADR 0030.
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
