name: Lighthouse

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Mede o carregamento (tela de menu) servindo o dist; assertions em
      # "warn" para acompanhar a tendência sem bloquear. Ver ADR 0030.
      - name: Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      # Comentário fixo (sticky) com os scores do Lighthouse no PR.
      - name: Lighthouse PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          MANIFEST: ${{ steps.lhci.outputs.manifest }}
          LINKS: ${{ steps.lhci.outputs.links }}
        with:
          script: |
            const marker = '<!-- lighthouse-comment -->';
            let manifest = [];
            let links = {};
            try { manifest = JSON.parse(process.env.MANIFEST || '[]'); } catch {}
            try { links = JSON.parse(process.env.LINKS || '{}'); } catch {}
            const summary = (manifest.find(m => m.isRepresentativeRun) || manifest[0] || {}).summary || {};
            const pct = (v) => (v == null ? '—' : Math.round(v * 100));
            const url = Object.values(links)[0] || '';
            const body = [
              marker,
              '## 🔦 Lighthouse',
              '',
              '| Categoria | Score |',
              '|---|---|',
              `| Performance | ${pct(summary.performance)} |`,
              `| Acessibilidade | ${pct(summary.accessibility)} |`,
              `| Boas práticas | ${pct(summary['best-practices'])} |`,
              `| SEO | ${pct(summary.seo)} |`,
              '',
              url ? `[Relatório completo](${url})` : '_Relatório indisponível nesta run._',
              '<sub>preset desktop · tela de menu · assertions em warn</sub>',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
